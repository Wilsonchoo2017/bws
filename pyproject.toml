[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "--cov=api --cov=services --cov=db --cov=bws_types --cov=config --cov-report=term-missing --cov-fail-under=0"

[tool.coverage.run]
source = ["api", "services", "db", "bws_types", "config"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    ".venv/*",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "if TYPE_CHECKING:",
]
